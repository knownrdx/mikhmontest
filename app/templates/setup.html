<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initial Setup — {{ BRAND_NAME }}</title>
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modern_ui.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        position: relative;
        overflow: hidden;
      }
      body::before {
        content: '';
        position: absolute;
        width: 500px; height: 500px;
        background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
        opacity: 0.08;
        top: -150px; right: -100px;
        border-radius: 50%;
      }
      body::after {
        content: '';
        position: absolute;
        width: 400px; height: 400px;
        background: radial-gradient(circle, #8b5cf6 0%, transparent 70%);
        opacity: 0.06;
        bottom: -100px; left: -80px;
        border-radius: 50%;
      }
      .setup-wrap {
        width: 100%;
        max-width: 480px;
        padding: 16px;
        position: relative;
        z-index: 1;
        animation: mmCardEntrance .5s ease both;
      }
      .setup-card {
        background: rgba(30,41,59,0.95) !important;
        backdrop-filter: blur(20px) !important;
        border-radius: 24px !important;
        border: 1px solid rgba(255,255,255,.08) !important;
        box-shadow: 0 24px 60px rgba(0,0,0,.35) !important;
        padding: 36px 32px !important;
      }
      .setup-card .form-control { background: #0f172a; border-color: #334155; color: #e2e8f0; }
      .setup-card .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(37,99,235,.2); }
      .setup-card .input-group-text { background: #0f172a; border-color: #334155; color: #64748b; }
      .setup-card .form-label { color: #94a3b8; font-size: .85rem; font-weight: 600; }
      .setup-card .text-muted { color: #64748b !important; }
      .setup-card .logo-wrap {
        width: 56px; height: 56px; border-radius: 16px;
        background: linear-gradient(135deg, var(--accent), #8b5cf6);
        display: inline-flex; align-items: center; justify-content: center;
        margin-bottom: 16px; box-shadow: 0 4px 16px rgba(37,99,235,.3);
      }
      .setup-card .logo-wrap i { color: #fff; font-size: 24px; }
      .setup-card .btn-primary {
        background: linear-gradient(135deg, var(--accent), #8b5cf6) !important;
        border: none !important;
        padding: 12px !important;
        font-weight: 700;
        font-size: 0.95rem;
        border-radius: 12px !important;
        box-shadow: 0 4px 16px rgba(37,99,235,.3);
      }
      .setup-card .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 24px rgba(37,99,235,.4);
      }
      .setup-badge {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 4px 12px; border-radius: 50px;
        background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.2);
        font-size: .7rem; color: #10b981; font-weight: 600;
      }
    </style>
    <style>:root{--accent: {{ BRAND_ACCENT|default('#2563eb') }};}</style>
</head>
<body>
    <div class="setup-wrap">
        <div class="setup-card">
            <div class="text-center mb-4">
                <div class="logo-wrap mx-auto">
                    <i class="fa-solid fa-bolt"></i>
                </div>
                <h5 class="fw-bold mb-1" style="color:#e2e8f0;">Initial Setup</h5>
                <div class="setup-badge mx-auto"><i class="fa-solid fa-sparkles"></i> First Time Setup</div>
                <p class="text-muted small mt-2 mb-0">Create your Super Admin account to get started.</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show small py-2" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.setup') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-user" style="font-size:13px;"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="admin" required autofocus
                               value="{{ form_data.username if form_data else '' }}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-envelope" style="font-size:13px;"></i></span>
                        <input type="email" name="email" class="form-control" placeholder="admin@example.com" required
                               value="{{ form_data.email if form_data else '' }}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-lock" style="font-size:13px;"></i></span>
                        <input type="password" name="password" id="setupPass" class="form-control" placeholder="Min 6 characters" required>
                        <button type="button" class="input-group-text" onclick="togglePass('setupPass','eye1')" style="cursor:pointer;border-radius:0 10px 10px 0;">
                          <i class="fa-solid fa-eye" id="eye1" style="font-size:13px;"></i>
                        </button>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-lock" style="font-size:13px;"></i></span>
                        <input type="password" name="confirm_password" id="setupPass2" class="form-control" placeholder="Re-enter password" required>
                        <button type="button" class="input-group-text" onclick="togglePass('setupPass2','eye2')" style="cursor:pointer;border-radius:0 10px 10px 0;">
                          <i class="fa-solid fa-eye" id="eye2" style="font-size:13px;"></i>
                        </button>
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-rocket me-2"></i>Create Admin & Start
                    </button>
                </div>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted" style="font-size: 0.7rem;">&copy; {{ BRAND_NAME }} 2026</p>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePass(fid, eid) {
  const p = document.getElementById(fid);
  const e = document.getElementById(eid);
  if (p.type === 'password') { p.type = 'text'; e.className = 'fa-solid fa-eye-slash'; }
  else { p.type = 'password'; e.className = 'fa-solid fa-eye'; }
}
</script>
</body>
</html>
