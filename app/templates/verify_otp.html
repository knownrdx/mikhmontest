<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP — {{ BRAND_NAME }}</title>
  <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='img/favicon-32.png') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/modern_ui.css') }}">
  <style>
    :root { --accent: {{ BRAND_ACCENT|default('#2563eb') }}; }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #0a0f1e;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(37,99,235,.25) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(139,92,246,.15) 0%, transparent 60%);
      font-family: 'Inter', system-ui, sans-serif;
      padding: 16px;
    }

    .otp-wrap {
      max-width: 420px; width: 100%;
      animation: cardIn .5s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes cardIn {
      from { opacity:0; transform: translateY(30px) scale(.96); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    .otp-card {
      background: rgba(15,23,42,.9);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;
      padding: 40px 36px 36px;
      box-shadow:
        0 0 0 1px rgba(37,99,235,.15),
        0 32px 64px rgba(0,0,0,.5),
        inset 0 1px 0 rgba(255,255,255,.05);
      backdrop-filter: blur(20px);
    }

    /* Glowing icon */
    .otp-icon-ring {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      position: relative;
      box-shadow: 0 0 0 0 rgba(37,99,235,.4);
      animation: iconPulse 2.5s ease infinite;
    }
    @keyframes iconPulse {
      0%  { box-shadow: 0 0 0 0 rgba(37,99,235,.5); }
      70% { box-shadow: 0 0 0 18px rgba(37,99,235,0); }
      100%{ box-shadow: 0 0 0 0 rgba(37,99,235,0); }
    }
    .otp-icon-ring i { color:#fff; font-size: 30px; }

    .otp-title {
      font-size: 1.5rem; font-weight: 800;
      color: #f1f5f9;
      text-align: center; margin-bottom: 6px;
    }
    .otp-sub {
      font-size: .85rem; color: #64748b;
      text-align: center; margin-bottom: 32px;
    }

    /* OTP digit inputs */
    .otp-inputs {
      display: flex; gap: 10px; justify-content: center;
      margin-bottom: 28px;
    }
    .otp-digit {
      width: 52px; height: 60px;
      background: rgba(255,255,255,.05);
      border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 14px;
      text-align: center;
      font-size: 1.5rem; font-weight: 800;
      color: #f1f5f9;
      transition: border-color .2s, box-shadow .2s, transform .1s;
      outline: none;
      caret-color: var(--accent);
      -moz-appearance: textfield;
    }
    .otp-digit::-webkit-outer-spin-button,
    .otp-digit::-webkit-inner-spin-button { -webkit-appearance: none; }
    .otp-digit:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.25);
      transform: scale(1.06);
      background: rgba(37,99,235,.08);
    }
    .otp-digit.filled {
      border-color: rgba(37,99,235,.5);
      background: rgba(37,99,235,.1);
    }
    /* Hidden real input */
    #otpHidden { display: none; }

    .btn-verify {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      color: #fff;
      font-weight: 800;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      transition: filter .2s, transform .1s;
      position: relative; overflow: hidden;
    }
    .btn-verify:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-verify:active { transform: translateY(0); }
    .btn-verify:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .btn-verify .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Timer */
    .otp-timer {
      text-align: center; margin-top: 18px;
      font-size: .82rem; color: #64748b;
    }
    .otp-timer .time-val { font-weight: 700; color: #94a3b8; }
    .otp-timer .time-val.urgent { color: #ef4444; }

    .back-link {
      display: block; text-align: center;
      margin-top: 20px;
      font-size: .82rem; color: #64748b;
      text-decoration: none;
      transition: color .2s;
    }
    .back-link:hover { color: var(--accent); }

    /* Flash alerts */
    .flash-wrap { margin-bottom: 18px; }
    .flash-wrap .alert {
      border-radius: 12px; font-size: .83rem; padding: 10px 14px;
      border: none;
    }
    .alert-danger  { background: rgba(239,68,68,.15);  color: #fca5a5; }
    .alert-success { background: rgba(34,197,94,.15);  color: #86efac; }
    .alert-warning { background: rgba(245,158,11,.15); color: #fcd34d; }
    .alert-info    { background: rgba(59,130,246,.15); color: #93c5fd; }
  </style>
</head>
<body>
  <div class="otp-wrap">
    <div class="otp-card">

      <!-- Icon -->
      <div class="otp-icon-ring">
        <i class="fa-solid fa-shield-halved"></i>
      </div>

      <h1 class="otp-title">Verify OTP</h1>
      <p class="otp-sub">Enter the 6-digit code sent to your email</p>

      <!-- Flash messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-wrap">
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">
              <i class="fa-solid fa-{{ 'circle-check' if category == 'success' else 'triangle-exclamation' }} me-2"></i>{{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth.verify_otp') }}" id="otpForm">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="user_id" value="{{ user_id|default('') }}">
        <input type="hidden" name="next" value="{{ next or '' }}">
        <input type="hidden" name="remember" value="{{ 'on' if remember == True or remember == 'on' else 'off' }}">
        <input type="hidden" name="otp" id="otpHidden">

        <!-- 6 digit boxes -->
        <div class="otp-inputs" id="otpBoxes">
          <input class="otp-digit" type="number" maxlength="1" min="0" max="9" inputmode="numeric" tabindex="1">
          <input class="otp-digit" type="number" maxlength="1" min="0" max="9" inputmode="numeric" tabindex="2">
          <input class="otp-digit" type="number" maxlength="1" min="0" max="9" inputmode="numeric" tabindex="3">
          <input class="otp-digit" type="number" maxlength="1" min="0" max="9" inputmode="numeric" tabindex="4">
          <input class="otp-digit" type="number" maxlength="1" min="0" max="9" inputmode="numeric" tabindex="5">
          <input class="otp-digit" type="number" maxlength="1" min="0" max="9" inputmode="numeric" tabindex="6">
        </div>

        <button type="submit" class="btn-verify" id="verifyBtn" disabled>
          <span id="btnText"><i class="fa-solid fa-check me-2"></i>Verify Code</span>
          <span class="spinner" id="btnSpinner"></span>
        </button>
      </form>

      <!-- Countdown timer (5 min) -->
      <div class="otp-timer">
        Code expires in <span class="time-val" id="countdown">05:00</span>
      </div>

      <a href="{{ url_for('auth.login') }}" class="back-link">
        <i class="fa-solid fa-arrow-left me-1"></i>Back to login
      </a>
    </div>
  </div>

  <script>
    // ─── OTP digit inputs ──────────────────────────────────────────
    const digits = Array.from(document.querySelectorAll('.otp-digit'));
    // Clear any browser-cached values on load
    window.addEventListener('load', () => { digits.forEach(d => { d.value = ''; }); digits[0] && digits[0].focus(); });
    const hidden = document.getElementById('otpHidden');
    const verifyBtn = document.getElementById('verifyBtn');

    function getOtp() { return digits.map(d => d.value).join(''); }

    function updateState() {
      const otp = getOtp();
      hidden.value = otp;
      verifyBtn.disabled = otp.length < 6;
      digits.forEach(d => d.classList.toggle('filled', d.value !== ''));
    }

    digits.forEach((d, i) => {
      d.addEventListener('input', () => {
        // allow only one char
        if (d.value.length > 1) d.value = d.value.slice(-1);
        if (d.value && i < digits.length - 1) digits[i + 1].focus();
        updateState();
      });

      d.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !d.value && i > 0) {
          digits[i - 1].value = '';
          digits[i - 1].focus();
          updateState();
        }
        if (e.key === 'ArrowLeft' && i > 0) digits[i - 1].focus();
        if (e.key === 'ArrowRight' && i < digits.length - 1) digits[i + 1].focus();
      });

      // Handle paste anywhere
      d.addEventListener('paste', e => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
        text.split('').forEach((ch, j) => { if (digits[j]) digits[j].value = ch; });
        const next = Math.min(text.length, digits.length - 1);
        digits[next].focus();
        updateState();
      });
    });

    // Focus first box on load
    setTimeout(() => digits[0].focus(), 100);

    // Loading state on submit
    document.getElementById('otpForm').addEventListener('submit', () => {
      verifyBtn.disabled = true;
      document.getElementById('btnText').style.display = 'none';
      document.getElementById('btnSpinner').style.display = 'block';
    });

    // ─── Countdown timer (5 minutes) ──────────────────────────────
    let seconds = 300;
    const countEl = document.getElementById('countdown');
    const timer = setInterval(() => {
      seconds--;
      if (seconds <= 0) {
        clearInterval(timer);
        countEl.textContent = 'Expired';
        countEl.classList.add('urgent');
        verifyBtn.disabled = true;
        verifyBtn.textContent = 'Code Expired';
        return;
      }
      const m = String(Math.floor(seconds / 60)).padStart(2, '0');
      const s = String(seconds % 60).padStart(2, '0');
      countEl.textContent = `${m}:${s}`;
      if (seconds <= 60) countEl.classList.add('urgent');
    }, 1000);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
