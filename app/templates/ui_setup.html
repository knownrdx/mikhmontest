<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose Layout</title>
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='img/favicon-32.png') }}">
    <link rel="icon" type="image/png" sizes="64x64" href="{{ url_for('static', filename='img/favicon-64.png') }}">
    <link rel="apple-touch-icon" sizes="256x256" href="{{ url_for('static', filename='img/logo-square-256.png') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/modern_ui.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container py-5" style="max-width: 920px;">
    <div class="text-center mb-4">
      <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-primary text-white" style="width:64px;height:64px;">
        <i class="fa-solid fa-sliders fs-3"></i>
      </div>
      <h3 class="mt-3 mb-1 fw-bold">Your Dashboard, your way</h3>
      <div class="text-muted">Choose how you want your page to look after login.</div>
    </div>

    <form method="POST" class="card shadow-sm border-0">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="card-body p-4">

        <div class="mb-4">
          <div class="fw-semibold mb-2">Layout</div>
          <div class="row g-3">
            <div class="col-md-4">
              <label class="card h-100 p-3 border-2 cursor-pointer">
                <input class="form-check-input" type="radio" name="layout" value="full" checked>
                <div class="mt-2 fw-semibold"><i class="fa-solid fa-columns me-2 text-accent"></i>Navbar + Sidebar</div>
                <div class="text-muted small">Best for desktop & full features</div>
              </label>
            </div>
            <div class="col-md-4">
              <label class="card h-100 p-3 border-2 cursor-pointer">
                <input class="form-check-input" type="radio" name="layout" value="navbar">
                <div class="mt-2 fw-semibold"><i class="fa-solid fa-bars me-2 text-accent"></i>Only Navbar</div>
                <div class="text-muted small">Clean look for mobile</div>
              </label>
            </div>
            <div class="col-md-4">
              <label class="card h-100 p-3 border-2 cursor-pointer">
                <input class="form-check-input" type="radio" name="layout" value="sidebar">
                <div class="mt-2 fw-semibold"><i class="fa-solid fa-list me-2 text-accent"></i>Only Sidebar</div>
                <div class="text-muted small">Fast navigation</div>
              </label>
            </div>
          </div>
        </div>

        <div class="mb-4">
          <div class="fw-semibold mb-2">After login, open</div>
          <select class="form-select" name="landing">
            <option value="dashboard" selected>Dashboard</option>
            <option value="profile">Profile</option>
          </select>
          <div class="form-text">You can change this later from your profile.</div>
        </div>

        <div class="d-flex justify-content-end">
          <button class="btn btn-primary px-4">
            Continue <i class="fa-solid fa-arrow-right ms-2"></i>
          </button>
        </div>
      </div>
    </form>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
