<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Verify Identity — {{ BRAND_NAME }}</title>
  <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
  <style>
    :root { --accent: {{ BRAND_ACCENT|default('#2563eb') }}; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 50%, #f5f3ff 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 48px rgba(37,99,235,.12), 0 2px 8px rgba(0,0,0,.06);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
      margin: 16px;
    }

    .card-header {
      background: linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 75%, #7c3aed) 100%);
      padding: 32px 32px 28px;
      text-align: center;
      position: relative;
    }
    .shield-wrap {
      width: 68px; height: 68px;
      background: rgba(255,255,255,.2);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 28px; color: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,.12);
    }
    .card-header h2 { color: #fff; font-size: 1.25rem; font-weight: 800; margin: 0 0 6px; }
    .card-header p  { color: rgba(255,255,255,.8); font-size: .83rem; margin: 0; }

    .card-body { padding: 32px; }

    .digit-row {
      display: flex; gap: 8px; justify-content: center; margin-bottom: 28px;
    }
    .digit-box {
      width: 52px; height: 64px;
      border: 2.5px solid var(--border, #e2e8f0);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 900; font-family: monospace;
      color: #0f172a;
      background: #f8fafc;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    .digit-box.active {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .digit-box.filled {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 6%, #fff);
    }

    /* Hidden real input overlaps the digit row for native keyboard */
    .hidden-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px; height: 1px;
    }

    .btn-verify {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      font-size: 1rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: filter .15s, transform .1s;
    }
    .btn-verify:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .btn-verify:active { transform: none; }
    .btn-verify:disabled { opacity: .6; cursor: default; transform: none; }

    .hint {
      text-align: center;
      font-size: .78rem;
      color: #94a3b8;
      margin-top: 20px;
      line-height: 1.6;
    }
    .hint a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .hint a:hover { text-decoration: underline; }

    .error-alert {
      background: rgba(239,68,68,.08);
      border: 1.5px solid rgba(239,68,68,.25);
      color: #b91c1c;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: .82rem;
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 8px;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="shield-wrap"><i class="fa-solid fa-mobile-screen-button"></i></div>
    <h2>Authenticator Code</h2>
    <p>Open your app and enter the 6-digit code</p>
  </div>
  <div class="card-body">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat, msg in messages %}
      <div class="error-alert"><i class="fa-solid fa-circle-exclamation"></i>{{ msg }}</div>
      {% endfor %}{% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.verify_totp_login') }}" id="totpForm">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="user_id" value="{{ user_id }}">
      <input type="hidden" name="remember" value="{{ remember }}">
      <input type="hidden" name="next" value="{{ next or '' }}">

      <!-- Visual digit boxes -->
      <div class="digit-row" id="digitRow" onclick="document.getElementById('realInput').focus()">
        <div class="digit-box" id="d0"></div>
        <div class="digit-box" id="d1"></div>
        <div class="digit-box" id="d2"></div>
        <div class="digit-box" id="d3"></div>
        <div class="digit-box" id="d4"></div>
        <div class="digit-box" id="d5"></div>
      </div>

      <!-- Hidden real input -->
      <input type="text" name="code" id="realInput" class="hidden-input"
             maxlength="6" inputmode="numeric" pattern="[0-9]*"
             autocomplete="one-time-code" autofocus>

      <button type="submit" class="btn-verify" id="submitBtn" disabled>
        <i class="fa-solid fa-check me-2"></i>Verify
      </button>
    </form>

    <div class="hint">
      <i class="fa-solid fa-clock me-1"></i> Code refreshes every 30 seconds<br>
      <a href="{{ url_for('auth.login') }}">← Back to login</a>
    </div>
  </div>
</div>

<script>
(function() {
  const saved = localStorage.getItem('ui_theme') || 'light';
  document.documentElement.setAttribute('data-bs-theme', saved);
})();

const inp    = document.getElementById('realInput');
const boxes  = Array.from(document.querySelectorAll('.digit-box'));
const form   = document.getElementById('totpForm');
const submit = document.getElementById('submitBtn');

function renderDigits(val) {
  boxes.forEach((b, i) => {
    b.textContent = val[i] || '';
    b.className = 'digit-box' + (i < val.length ? ' filled' : '') + (i === val.length ? ' active' : '');
  });
  // last box highlight when full
  if (val.length === 6) {
    boxes.forEach(b => b.classList.remove('active'));
    boxes[5].classList.add('filled');
  }
  submit.disabled = val.length < 6;
}

inp.addEventListener('input', function() {
  this.value = this.value.replace(/\D/g, '').slice(0, 6);
  renderDigits(this.value);
  if (this.value.length === 6) {
    submit.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>Verifying...';
    form.submit();
  }
});

// Click on digit row focuses hidden input
document.getElementById('digitRow').addEventListener('click', () => inp.focus());

// Init empty state
renderDigits('');

// Auto-focus
setTimeout(() => inp.focus(), 100);
</script>
</body>
</html>
