<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — {{ BRAND_NAME }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/modern_ui.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>:root{--accent: {{ BRAND_ACCENT|default('#2563eb') }};}</style>
  <style>
    body { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); }
    .err-card { max-width:460px; width:100%; text-align:center; animation:mmCardEntrance .5s ease both; }
    .err-num { font-size:6rem; font-weight:900; letter-spacing:-4px;
      background:linear-gradient(135deg,var(--accent),#8b5cf6);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height:1; }
  </style>
</head>
<body>
  <div class="err-card px-4">
    <div class="err-num">404</div>
    <h4 class="fw-bold mt-2 mb-2">Page Not Found</h4>
    <p class="text-muted mb-4" style="font-size:.92rem;">The page you're looking for doesn't exist or has been moved.</p>
    <div class="d-flex gap-2 justify-content-center flex-wrap">
      <a class="btn btn-primary px-4" href="{{ url_for('dashboard.dashboard') }}"><i class="fa-solid fa-home me-2"></i>Dashboard</a>
      <a class="btn btn-outline-secondary px-4" href="{{ url_for('auth.login') }}"><i class="fa-solid fa-right-to-bracket me-2"></i>Login</a>
    </div>
    <div class="text-muted small mt-4">{{ BRAND_NAME }}</div>
  </div>
</body>
</html>
