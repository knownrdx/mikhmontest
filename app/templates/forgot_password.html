<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card p-4 shadow-sm">
                    <h5 class="fw-bold text-center mb-3">Password Recovery</h5>
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}{% for c, m in messages %}<div class="alert alert-{{c}} small">{{m}}</div>{% endfor %}{% endif %}
                    {% endwith %}
                    <form method="POST">
                        <input type="email" name="email" class="form-control mb-3" placeholder="Enter Email" required>
                        <button class="btn btn-primary w-100">Recover</button>
                    </form>
                    <div class="mt-3 text-center"><a href="{{ url_for('login') }}" class="small text-decoration-none">Back to Login</a></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
